<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Master v5.3 Show Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        body{background:#0a0a0a;color:#fff;font-family:sans-serif;padding-bottom:100px;zoom:1.15}
        .card{background:#161616;border-radius:24px;padding:22px;margin-bottom:18px;border:1px solid #262626;box-shadow:0 10px 40px rgba(0,0,0,0.6)}
        input,select,textarea{background:#222;border:2px solid #333;color:#fff;padding:18px;border-radius:15px;width:100%;margin-bottom:15px;font-size:16px;font-weight:900;font-style:italic;-webkit-appearance:none}
        ::placeholder { color: #555; font-weight: 800; text-transform: uppercase; font-size: 11px; font-style: normal; }
        .btn-gold{background:#f59e0b;color:#000;font-weight:900;padding:20px;border-radius:18px;width:100%;text-transform:uppercase;font-size:15px;letter-spacing:1px}
        .tab-btn{background:#111;color:#444;flex:1;padding:16px 5px;border-radius:14px;font-size:11px;font-weight:900;margin:3px;border:1px solid #222}
        .active-tab{background:#f59e0b;color:#000;border-color:#fbbf24}
        .magic-box{background:#1a1a1a;border:2px dashed #f59e0b;color:#f59e0b;padding:15px;border-radius:15px;margin-bottom:20px;font-size:13px;font-weight:900;text-align:center;text-transform:uppercase}
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">
    <h1 class="text-4xl font-black text-amber-500 mb-8 text-center italic tracking-tighter">COFFEE MASTER <span class="text-white font-light text-xs block tracking-widest mt-1">SHOW CLOUD v5.3</span></h1>
    
    <div class="flex mb-8 bg-black p-1 rounded-2xl sticky top-2 z-50 border border-zinc-800 shadow-2xl">
        <button id="btn-cafes" class="tab-btn active-tab" onclick="showTab('cafes')">GRÃOS</button>
        <button id="btn-receitas" class="tab-btn" onclick="showTab('receitas')">RECEITAS</button>
        <button id="btn-preparo" class="tab-btn" onclick="showTab('preparo')">PREPARAR</button>
        <button id="btn-log" class="tab-btn" onclick="showTab('log')">DIÁRIO</button>
    </div>

    <div id="tab-cafes">
        <div class="card">
            <div class="magic-box italic">✨ COLE O TEXTO DA UNIQUE AQUI</div>
            <textarea id="g-magic" placeholder="COLE A DESCRIÇÃO PARA PREENCHIMENTO AUTOMÁTICO..." rows="2" oninput="magicParse()"></textarea>
            
            <hr class="border-zinc-800 mb-6">
            
            <label class="text-[10px] font-black text-zinc-500 uppercase block mb-1 ml-2 tracking-widest">Produtor</label>
            <input type="text" id="g-prod" placeholder="EX: UNIQUE CAFÉS">
            
            <label class="text-[10px] font-black text-zinc-500 uppercase block mb-1 ml-2 tracking-widest">Nome do Grão</label>
            <input type="text" id="g-nome" placeholder="NOME DO CAFÉ">
            
            <label class="text-[10px] font-black text-zinc-500 uppercase block mb-1 ml-2 tracking-widest">Torra</label>
            <select id="g-torra">
                <option value="" disabled selected>SELECIONE A TORRA</option>
                <option>CLARA</option><option>MÉDIA-CLARA</option><option>MÉDIA</option><option>ESCURA</option>
            </select>
            
            <label class="text-[10px] font-black text-zinc-500 uppercase block mb-1 ml-2 tracking-widest">Data da Torra</label>
            <input type="date" id="g-data">
            
            <button class="btn-gold" onclick="saveG()">Salvar no Google</button>
        </div>
        <div id="list-g" class="space-y-4"></div>
    </div>

    <div id="tab-receitas" class="hidden">
        <div class="card">
            <input type="text" id="r-nome" placeholder="NOME DA RECEITA (EX: V60)">
            <input type="number" id="r-ratio" placeholder="RATIO (EX: 15)">
            <textarea id="r-desc" placeholder="PASSOS DO PREPARO..." rows="3"></textarea>
            <button class="btn-gold" onclick="saveR()">Guardar Receita</button>
        </div>
        <div id="list-r" class="space-y-3"></div>
    </div>

    <div id="tab-preparo" class="hidden">
        <div class="card border-2 border-amber-600 text-center bg-black">
            <label class="text-[10px] font-black text-zinc-500 uppercase block mb-2 tracking-widest">Grão</label>
            <select id="p-g" onchange="upCalc()"></select>
            
            <label class="text-[10px] font-black text-zinc-500 uppercase block mb-2 tracking-widest">Receita</label>
            <select id="p-r" onchange="upCalc()"></select>
            
            <label class="text-[10px] font-black text-zinc-500 uppercase block mb-2 tracking-widest">Quantidade de Pó (g)</label>
            <input type="number" id="p-po" value="20" oninput="upCalc()" class="text-center text-5xl text-amber-500 font-black italic bg-transparent border-none">
            
            <div class="bg-zinc-900 rounded-3xl p-8 mt-4 border border-zinc-800">
                <div class="text-[11px] font-black text-zinc-400 mb-2 tracking-widest uppercase">Água Total</div>
                <div id="res" class="text-7xl font-black text-white italic">---</div>
                <div class="text-amber-500 font-black mt-2 text-2xl italic">ML</div>
            </div>
        </div>
    </div>

    <div id="tab-log" class="hidden">
        <div class="card bg-zinc-900 border-dashed border-zinc-700 text-center py-20">
            <p class="text-zinc-600 font-black italic uppercase">Em desenvolvimento...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCbIsrGjuu6KN-A0xpZUC6ID9aOHBEIJSE",
            authDomain: "coffee-master-e1f5c.firebaseapp.com",
            projectId: "coffee-master-e1f5c",
            storageBucket: "coffee-master-e1f5c.firebasestorage.app",
            messagingSenderId: "171441357303",
            appId: "1:171441357303:web:c85dc841ee73f6f29e2ef2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function magicParse() {
            const txt = document.getElementById('g-magic').value;
            if(!txt) return;
            const linhas = txt.split('\n');
            if(linhas.length >= 1) {
                document.getElementById('g-prod').value = "UNIQUE CAFÉS";
                document.getElementById('g-nome').value = linhas[0].toUpperCase();
                if(txt.toLowerCase().includes('média')) document.getElementById('g-torra').value = "MÉDIA";
                if(txt.toLowerCase().includes('clara')) document.getElementById('g-torra').value = "CLARA";
            }
        }

        function showTab(t){
            ['cafes','receitas','preparo','log'].forEach(i=>{
                document.getElementById('tab-'+i)?.classList.toggle('hidden', i!==t);
                document.getElementById('btn-'+i)?.classList.toggle('active-tab', i===t);
            });
            if(t==='cafes') loadG();
            if(t==='receitas') loadR();
            if(t==='preparo') loadPrep();
        }

        async function saveG() {
            const btn = event.target; btn.innerText = "ENVIANDO...";
            await db.collection('cafes').add({
                prod: document.getElementById('g-prod').value,
                nome: document.getElementById('g-nome').value,
                torra: document.getElementById('g-torra').value,
                data: document.getElementById('g-data').value,
                ts: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('g-magic').value = "";
            btn.innerText = "SALVAR NO GOOGLE"; loadG();
        }

        async function loadG() {
            const snap = await db.collection('cafes').orderBy('ts', 'desc').get();
            let h = '';
            snap.forEach(d => {
                const i = d.data();
                const dataFtd = i.data ? i.data.split('-').reverse().join('/') : '--/--/--';
                h += `<div class="card border-l-8 border-l-amber-500">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="text-[10px] text-zinc-500 font-black uppercase tracking-widest">${i.prod}</div>
                                <div class="text-2xl font-black text-white italic uppercase leading-tight">${i.nome}</div>
                            </div>
                            <div class="text-[10px] font-black text-zinc-600 bg-zinc-800 px-2 py-1 rounded italic">${dataFtd}</div>
                        </div>
                        <div class="text-[11px] mt-4 bg-zinc-800 inline-block px-3 py-1 rounded-lg text-amber-500 font-black uppercase italic">${i.torra}</div>
                      </div>`;
            });
            document.getElementById('list-g').innerHTML = h;
        }

        async function saveR() {
            await db.collection('receitas').add({
                nome: document.getElementById('r-nome').value,
                ratio: parseFloat(document.getElementById('r-ratio').value),
                desc: document.getElementById('r-desc').value,
                ts: firebase.firestore.FieldValue.serverTimestamp()
            });
            loadR();
        }

        async function loadR() {
            const snap = await db.collection('receitas').orderBy('ts', 'desc').get();
            let h = '';
            snap.forEach(d => {
                const i = d.data();
                h += `<div class="card border-l-8 border-l-zinc-700">
                        <div class="text-2xl font-black text-amber-500 italic uppercase">${i.nome}</div>
                        <div class="text-xs font-black text-zinc-400 mt-1 uppercase">RATIO 1:${i.ratio}</div>
                      </div>`;
            });
            document.getElementById('list-r').innerHTML = h;
        }

        async function loadPrep() {
            const [gc, rc] = await Promise.all([db.collection('cafes').get(), db.collection('receitas').get()]);
            let gh = '', rh = '';
            gc.forEach(d => gh += `<option value="${d.id}">${d.data().nome.toUpperCase()}</option>`);
            rc.forEach(d => rh += `<option value="${d.data().ratio}">${d.data().nome.toUpperCase()} (1:${d.data().ratio})</option>`);
            document.getElementById('p-g').innerHTML = gh;
            document.getElementById('p-r').innerHTML = rh;
            upCalc();
        }

        function upCalc() {
            const po = parseFloat(document.getElementById('p-po').value) || 0;
            const ratio = parseFloat(document.getElementById('p-r').value) || 0;
            document.getElementById('res').innerText = Math.round(po * ratio);
        }

        loadG();
    </script>
</body>
</html>
